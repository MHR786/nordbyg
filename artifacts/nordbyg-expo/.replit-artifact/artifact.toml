kind = "web"
previewPath = "/"
title = "NordByg Expo Denmark"
version = "1.0.0"
id = "artifacts/nordbyg-expo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18928

[services.development]
run = "pnpm --filter @workspace/nordbyg-expo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nordbyg-expo", "run", "build" ]
publicDir = "artifacts/nordbyg-expo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18928"
BASE_PATH = "/"
